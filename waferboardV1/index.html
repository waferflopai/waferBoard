<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>waferBoard · markdown dashboards</title>

    <link rel="icon" href="/favicon.ico" sizes="any" />

    <!-- Google Font: Raleway -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- External styles -->
    <link rel="stylesheet" href="style.css" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <!-- Marked.js -->
    <script src="https://unpkg.com/marked@11.1.1/dist/marked.min.js"></script>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Application logic -->
    <script src="script.js" defer></script>
</head>
<body>

    <!-- ─── TOAST ─── -->
    <div class="toast" id="toast"></div>

    <!-- ─── HELP MODAL ─── -->
    <div class="modal-overlay" id="helpModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>📖 How to use waferBoard</h2>
                <button class="modal-close" id="helpModalClose">✕</button>
            </div>
            <div class="modal-body" id="helpModalBody">
                <!-- content rendered by JS -->
            </div>
        </div>
    </div>

    <!-- ─── DASHBOARD ─── -->
    <div class="dashboard" id="app">

        <!-- HEADER -->
        <header class="dashboard-header">
            <div class="brand">
                <h1>wafer<span class="accent">Board</span></h1>
                <span class="tagline">· markdown dashboards</span>
            </div>
            <div class="header-actions">
                <span class="badge" id="fileBadge">📁 local</span>
                <button class="btn btn-sm" id="helpBtn">❓ Help</button>
                <button class="btn btn-sm" id="loadFilesBtn">📂 Load Files</button>
                <button class="btn btn-sm" id="resetAllBtn">↺ Reset</button>
                <div class="dropdown">
                    <button class="btn btn-sm btn-primary">Export ▼</button>
                    <div class="dropdown-content">
                        <a id="exportPDF">📄 PDF</a>
                        <a id="exportMD">📝 Markdown</a>
                        <a id="exportHTML">🌐 HTML</a>
                        <a id="exportPNG">🖼 PNG</a>
                        <a id="exportSVG">📁 SVG</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- GRID -->
        <div class="grid" id="grid"></div>

    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".md" multiple style="display:none;" />

</body>
</html>
